<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LarpVault • Live Like A Legend</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #0f172a, #1e2937); color: white; font-family: system-ui; }
    .card { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); }
    .success { animation: pop 0.4s ease-out; }
    @keyframes pop { 0% { transform: scale(0.8); } 100% { transform: scale(1); } }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
  <div class="max-w-md w-full card rounded-3xl shadow-2xl border border-white/10 p-8">
    <div class="text-center mb-8">
      <h1 class="text-5xl font-bold mb-2">🏴‍☠️ LarpVault</h1>
      <p class="text-xl text-amber-400">Live Like A Legend</p>
      <p class="text-sm text-gray-400 mt-1">Only $10,000 for perceived success</p>
    </div>

    <div class="space-y-6">
      <div>
        <label class="block text-sm font-medium mb-2">Your Email</label>
        <input id="email" type="email" value="adam@test.com"
               class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl focus:outline-none focus:border-amber-400 text-white">
      </div>

      <div>
        <label class="block text-sm font-medium mb-2">LARP Pack</label>
        <input id="packName" type="text" value="Ultimate LARP Pack"
               class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl focus:outline-none focus:border-amber-400 text-white">
      </div>

      <button onclick="purchase()" id="buyButton"
              class="w-full bg-amber-400 hover:bg-amber-500 transition-colors text-black font-bold text-xl py-4 rounded-2xl flex items-center justify-center gap-2">
        BUY NOW - BECOME A LEGEND 💰
      </button>
    </div>

    <div id="result" class="mt-8 text-center min-h-[140px]"></div>
  </div>

  <script>
    async function purchase() {
      const email = document.getElementById('email').value;
      const packName = document.getElementById('packName').value;
      const button = document.getElementById('buyButton');
      const resultDiv = document.getElementById('result');

      // Disable button + loading state
      button.disabled = true;
      button.innerHTML = 'Processing your fake success... ⏳';

      resultDiv.innerHTML = `<p class="text-amber-400">Processing...</p>`;

      try {
        const res = await fetch('http://localhost:7071/api/purchase', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, packName, price: 10000 })
        });

        const data = await res.json();

        if (res.ok) {
          resultDiv.innerHTML = `
            <div class="success bg-green-900/50 border border-green-400 rounded-2xl p-6 text-left">
              <p class="text-2xl mb-3">🎟️ Purchase Successful!</p>
              <p class="text-sm opacity-75 mb-2">Order ID: 
                <span class="font-mono bg-black/30 px-2 py-1 rounded">${data.orderId}</span>
              </p>
              <p class="text-amber-300">${data.message}</p>
              <button onclick="copyOrderId('${data.orderId}')" 
                      class="mt-4 text-sm bg-white/20 hover:bg-white/30 px-4 py-2 rounded-xl transition-colors">
                📋 Copy Order ID
              </button>
            </div>`;
        } else {
          resultDiv.innerHTML = `<p class="text-red-400">Error: ${data.error || 'Unknown error'}</p>`;
        }
      } catch (err) {
        resultDiv.innerHTML = `<p class="text-red-400">Cannot connect to backend.<br>Make sure <code>func start</code> is running.</p>`;
      } finally {
        // Re-enable button
        button.disabled = false;
        button.innerHTML = 'BUY NOW - BECOME A LEGEND 💰';
      }
    }

    function copyOrderId(orderId) {
      navigator.clipboard.writeText(orderId);
      alert('Order ID copied to clipboard! 📋');
    }
  </script>
</body>
</html>
