<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LarpVault • Live Like A Legend</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #0f172a, #1e2937); color: white; font-family: system-ui; }
    .card { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); }
    .success { animation: pop 0.4s ease-out; }
    @keyframes pop { 0% { transform: scale(0.8); } 100% { transform: scale(1); } }
  </style>
</head>
<body class="min-h-screen p-6">
  <div class="max-w-2xl mx-auto">
    <!-- Header -->
    <div class="text-center mb-10">
      <h1 class="text-6xl font-bold mb-2">🏴‍☠️ LarpVault</h1>
      <p class="text-2xl text-amber-400">Live Like A Legend</p>
      <p class="text-gray-400">Only $10,000 for perceived success</p>
    </div>

    <!-- Buy Section -->
    <div class="card rounded-3xl p-8 mb-10">
      <h2 class="text-2xl font-semibold mb-6 text-center">Buy Your Pack</h2>
      
      <div>
        <label class="block text-sm font-medium mb-2">Your Email</label>
        <input id="email" type="email" value="adam@test.com"
               class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl focus:outline-none focus:border-amber-400 text-white">
      </div>
    </div>

    <!-- Packs Browser (now clickable) -->
    <div class="card rounded-3xl p-8">
      <h2 class="text-2xl font-semibold mb-6">📦 Available LARP Packs</h2>
      
      <div id="packsList" class="grid grid-cols-1 gap-4">
        <!-- Packs loaded here with Buy buttons -->
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://larpvault-functions-eadfdghpdqbgexah.eastus-01.azurewebsites.net/api';

    async function purchase(email, packName) {
      const resultDiv = document.getElementById('purchaseResult') || 
                       (document.body.appendChild(document.createElement('div')));

      resultDiv.innerHTML = `<p class="text-amber-400 text-center">Processing your elite lifestyle...</p>`;

      try {
        const res = await fetch(`${API_BASE}/purchase`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, packName, price: 10000 })
        });

        const data = await res.json();

        if (res.ok) {
          resultDiv.innerHTML = `
            <div class="success bg-green-900/50 border border-green-400 rounded-2xl p-6 mt-6">
              <p class="text-2xl mb-3">🎟️ Purchase Successful!</p>
              <p class="mb-2">Order ID: <span class="font-mono bg-black/30 px-2 py-1 rounded">${data.orderId}</span></p>
              <p class="text-amber-300">${data.message}</p>
              <button onclick="copyToClipboard('${data.orderId}')" 
                      class="mt-4 text-sm bg-white/20 hover:bg-white/30 px-5 py-2 rounded-xl">
                📋 Copy Order ID
              </button>
            </div>`;
        } else {
          resultDiv.innerHTML = `<p class="text-red-400 text-center">Error: ${data.error || 'Unknown error'}</p>`;
        }
      } catch (err) {
        resultDiv.innerHTML = `<p class="text-red-400 text-center">Cannot connect to backend.</p>`;
      }
    }

    async function loadPacks() {
      const packsList = document.getElementById('packsList');
      packsList.innerHTML = `<p class="text-center text-gray-400">Loading packs...</p>`;

      try {
        const res = await fetch(`${API_BASE}/packs`);
        const data = await res.json();

        if (res.ok && data.packs) {
          let html = '';
          data.packs.forEach(pack => {
            html += `
              <div class="bg-white/5 border border-white/10 rounded-2xl p-5 hover:border-amber-400 transition-colors">
                <div class="flex justify-between items-start">
                  <div>
                    <h3 class="text-xl font-semibold">${pack.name}</h3>
                    <p class="text-gray-400 text-sm mt-1">${pack.description}</p>
                  </div>
                  <div class="text-right">
                    <p class="text-2xl font-bold text-amber-400">$${pack.price.toLocaleString()}</p>
                    <p class="text-xs text-gray-500">${pack.clips} clips</p>
                    <button onclick="purchase(document.getElementById('email').value, '${pack.name}')" 
                            class="mt-3 bg-amber-400 hover:bg-amber-500 text-black font-bold px-6 py-2 rounded-xl text-sm">
                      Buy This Pack
                    </button>
                  </div>
                </div>
              </div>`;
          });
          packsList.innerHTML = html;
        }
      } catch (err) {
        packsList.innerHTML = `<p class="text-red-400 text-center">Could not load packs.</p>`;
      }
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text);
      alert("✅ Order ID copied!");
    }

    // Load packs when page loads
    window.onload = loadPacks;
  </script>
</body>
</html>
